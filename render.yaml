services:
  # MySQL Private Service (accessible only internally by the Spring Boot app)
  - type: pserv
    name: kartiksharma-mysql
    runtime: docker
    dockerfilePath: Dockerfile.mysql
    envVars:
      - key: MYSQL_DATABASE
        value: portfolio_db
      - key: MYSQL_ROOT_PASSWORD
        value: Kartik@2005
      - key: MYSQL_USER
        value: root
      - key: MYSQL_PASSWORD
        value: Kartik@2005

  # Spring Boot Web Service
  - type: web
    name: kartiksharma
    runtime: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://kartiksharma-mysql:3306/portfolio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: Kartik@2005
      # Environment variables for other config:
      - key: JWT_SECRET
        value: mySecretKeyForPortfolioApp2024VeryLongAndSecure!@#$%
      - key: NVIDIA_API_KEY
