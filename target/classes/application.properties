# ===================================================
# Application Configuration
# ===================================================
spring.application.name=portfolio

# ===================================================
# Server Configuration
# ===================================================
server.port=8080

# ===================================================
# H2 Database Configuration
# ===================================================
spring.datasource.url=jdbc:h2:mem:portfolio_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (Optional, accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================================
# JPA / Hibernate Configuration
# ===================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================================
# JWT Configuration
# Change jwt.secret to a long random string in production
# ===================================================
jwt.secret=mySecretKeyForPortfolioApp2024VeryLongAndSecure!@#$%
jwt.expiration=86400000

